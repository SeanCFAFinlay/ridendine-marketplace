name: CI
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 9 * * *"

env:
  # Required for Next.js build (dummy values for CI only)
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
  SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role_key
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
  STRIPE_SECRET_KEY: sk_test_placeholder
  STRIPE_WEBHOOK_SECRET: whsec_placeholder

jobs:
  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Production data hygiene (IRR-015)
        run: pnpm verify:prod-data-hygiene
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Test (engine)
        run: pnpm --filter @ridendine/engine test
      - name: Test (db)
        run: pnpm --filter @ridendine/db test
      - name: Test (auth)
        run: pnpm --filter @ridendine/auth test
      - name: Test (utils)
        run: pnpm --filter @ridendine/utils test
      - name: Test (web)
        run: pnpm --filter @ridendine/web test
      - name: Test (ops-admin)
        run: pnpm --filter @ridendine/ops-admin test
      - name: Test (chef-admin)
        run: pnpm --filter @ridendine/chef-admin test
      - name: Test (driver-app)
        run: pnpm --filter @ridendine/driver-app test
      - name: Build
        run: pnpm build

  smoke-e2e:
    name: Playwright Browser Gate
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run smoke E2E (PR/push gate)
        if: github.event_name != 'schedule'
        run: pnpm test:smoke
      - name: Run full E2E (nightly)
        if: github.event_name == 'schedule'
        run: pnpm test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
